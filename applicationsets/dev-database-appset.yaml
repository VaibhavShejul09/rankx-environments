apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: dev-databases
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/VaibhavShejul09/rankx-environments.git
      revision: main
      directories:
      - path: environments/dev/databases/*
  template:
    metadata:
      name: '{{path.basename}}-dev'
      labels:
        type: database
        env: dev
      annotations:                     # 🔥 ADD HERE
        argocd.argoproj.io/sync-wave: "2"  
    spec:
      project: databases
      source:
        repoURL: https://github.com/VaibhavShejul09/centralized-helm-repo.git
        targetRevision: main
        path: charts/microservice-base
        helm:
          valueFiles:
          - https://raw.githubusercontent.com/VaibhavShejul09/rankx-environments/main/{{path}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
        namespace: dev
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 3
          backoff:
              duration: 5s
              factor: 2
              maxDuration: 1m  
        syncOptions:
        - CreateNamespace=true   