kind: StatefulSet
name: mysql-submission-service
replicaCount: 1

service:
  port: 3306

image:
  repository: mysql
  tag: 8.0
  imagePullPolicy: IfNotPresent

# Secret must be a map of key/value pairs, not just a name
secret:
  MYSQL_ROOT_PASSWORD: root

# ConfigMap (if you need MySQL database name)
config:
  MYSQL_DATABASE: application_submission_db

# Persistent volume
persistence:
  enabled: true                 # 🔥 REQUIRED
  name: mysql-submission-data
  mountPath: /var/lib/mysql
  storageClass: gp3             # 🔥 REQUIRED for EBS
  size: 5Gi

# startupProbe
startupProbe:
  exec:
    - sh
    - -c
    - mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD}
  periodSeconds: 10
  failureThreshold: 30

# Liveness probe
livenessProbe:
  exec:
    - sh
    - -c
    - mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD}
  initialDelaySeconds: 30
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

# Readiness probe
readinessProbe:
  exec:
    - sh
    - -c
    - mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD}
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

  resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"
