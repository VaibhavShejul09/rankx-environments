kind: Deployment

name: frontend

replicaCount: 1
syncWave: 6

image:
  repository: shejulv088/final_frontend
  tag: v1

service:
  type: ClusterIP
  port: 80

securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  container:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false   

config: {}
secret: {}

initContainers:
  - name: wait-for-backend
    image: busybox:1.36
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    command:
      - sh
      - -c
      - |
        echo "Waiting for backend to be ready..."
        until nc -z api-gateway 8080; do
          echo "Backend not ready, sleeping 5s..."
          sleep 5
        done
        echo "Backend is ready!"

# -------------------------
# Startup Probe  # startupProbe handles startup delay
# -------------------------
startupProbe:
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 30   # 150 sec startup time

# -------------------------
# Liveness Probe
# -------------------------
livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 10   # 🔥 reduce
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 5

# -------------------------
# Readiness Probe
# -------------------------
readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 5    # 🔥 reduce
  periodSeconds: 10         # 🔥 faster response
  timeoutSeconds: 2
  failureThreshold: 3

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
