kind: Deployment
name: discovery-server

replicaCount: 1
syncWave: 1

image:
  repository: shejulv088/final_discovery_server
  tag: "2-02b46d8"

service:
  type: ClusterIP
  port: 8761

config: false
secret: false

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 60
  periodSeconds: 20

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 30
  periodSeconds: 15

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"