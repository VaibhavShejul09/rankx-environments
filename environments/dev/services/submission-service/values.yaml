# -------------------------
# Deployment Kind
# -------------------------
kind: Deployment

name: submission-service
replicaCount: 1
syncWave: 4

labels:
  component: backend
  env: dev
  team: backend
  tier: app

# -------------------------
# Docker image
# -------------------------
image:
  repository: shejulv088/final_submission_service
  tag: v2
  pullPolicy: IfNotPresent

# -------------------------
# Service config
# -------------------------
service:
  type: ClusterIP
  port: 8083

securityContext:
  pod:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000

  container:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  

# -------------------------
# ConfigMap
# -------------------------
config:
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "true"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
  PROBLEM_SERVICE_URL: http://problem-service:8082
  SPRING_CONFIG_URI: http://config-server:8888
  SPRING_PROFILES_ACTIVE: native
  SPRING_DATASOURCE_URL: jdbc:mysql://mysql-submission-service:3306/application_submission_db
  SPRING_DATASOURCE_USERNAME: root
  EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
  JAVA_TOOL_OPTIONS: "-Xms256m -Xmx350m"

# -------------------------
# Secret
# -------------------------
secret:
  SPRING_DATASOURCE_PASSWORD: root

# -------------------------
# Init container for MySQL
# -------------------------
initContainers:
  - name: wait-for-mysql-auth
    image: busybox
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
    command:
      - sh
      - -c
      - |
        echo "Waiting for MySQL..."
        until nc -z mysql-submission-service 3306; do
          sleep 5
        done

# -------------------------
# Startup Probe  # startupProbe handles startup delay
# -------------------------
startupProbe:
  path: /actuator/health
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 30   # 150 sec startup time

# -------------------------
# Liveness Probe
# -------------------------
livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 10   # 🔥 reduce
  periodSeconds: 20
  timeoutSeconds: 2
  failureThreshold: 5

# -------------------------
# Readiness Probe
# -------------------------
readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 5    # 🔥 reduce
  periodSeconds: 10         # 🔥 faster response
  timeoutSeconds: 2
  failureThreshold: 3

# -------------------------
# Resources (optional)
# -------------------------
resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"
