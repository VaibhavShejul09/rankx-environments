apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  validationFailureAction: enforce
  background: true     //check existing resources also
  rules:
    - name: disallow-latest-tag
      match:
        resources:
          kinds:
            - Pod
      validate:
        message: "Using image tag 'latest' is not allowed. Use a fixed version tag."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
            initContainers:
              - image: "!*:latest"