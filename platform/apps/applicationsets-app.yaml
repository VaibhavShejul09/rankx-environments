apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: applicationsets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/VaibhavShejul09/rankx-environments.git
    targetRevision: main
    path: applicationsets
    directory:
      include: "dev-*"     #when want to deply all env add - include: "dev-*,qa-*,prod-*" 
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true