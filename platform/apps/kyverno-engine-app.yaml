apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-engine
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # 🔥 Install FIRST
spec:
  project: platform
  source:
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: 3.0.0   # use stable version
    helm:
      values: |
        admissionController:
          replicas: 2   # 🔥 HA setup
        backgroundController:
          replicas: 2
        cleanupController:
          replicas: 2
        reportsController:
          replicas: 2

  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true   # 🔥 auto create kyverno namespace