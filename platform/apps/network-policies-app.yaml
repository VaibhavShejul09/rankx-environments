apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"

spec:
  project: platform

  source:
    repoURL: https://github.com/VaibhavShejul09/rankx-environments.git
    targetRevision: main
    path: platform/security/network-policies

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true 

    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true