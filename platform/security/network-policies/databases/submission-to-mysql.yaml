apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-problem-to-mysql
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: "mysql-submission-service"

  policyTypes:
  - Ingress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: "submission-service"