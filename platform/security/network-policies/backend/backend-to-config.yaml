apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-config
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: "config-server"

  policyTypes:
  - Ingress

  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: "backend"